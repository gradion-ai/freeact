site_name: freeact
site_description: Freeact code action agent
site_url: https://gradion-ai.github.io/freeact/

repo_name: gradion-ai/freeact
repo_url: https://github.com/gradion-ai/freeact

copyright: Copyright &copy; 2025-2026 Gradion AI

theme:
  name: material
  logo: images/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.preview
    - navigation.instant.progress
    - navigation.top
    - navigation.tracking
    - search.suggest
    - toc.follow
    - content.code.copy
    - content.code.select
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [freeact]
          options:
            show_root_heading: true
            show_source: false
            show_signature_annotations: true
            signature_crossrefs: true
            separate_signature: true
            merge_init_into_class: true
            extensions:
              - griffe_pydantic
          inventories:
            - url: https://docs.python.org/3/objects.inv
              domains: [py, std]
  - llmstxt:
      markdown_description: |
        General-purpose AI agent that acts via code actions through a unified execution interface.

        Freeact is a lightweight, general-purpose agent that acts via code actions in a stateful execution environment provided by ipybox.
        A unified execution interface allows code actions to contain any combination of Python code, shell commands, and programmatic MCP tool calls, generated in one LLM inference pass.

        For programmatic MCP tool calling ("code mode"), freeact generates typed Python APIs from MCP server schemas.
        The agent inspects generated APIs prior to execution and composes them within code actions based on available type information.
        Successful code actions can be saved as reusable tools, capturing agent experience as executable knowledge, optionally combined with agent skills.

        Freeact supports tool discovery via agentic and semantic search, loading only task-relevant tool information into the context window.
        It can enforce application-level approval of code actions, shell commands, and programmatic tool calls, originating from both main agents and subagents.
        Freeact runs locally on your computer and is available as a CLI tool and Python SDK.
      full_output: llms-full.txt
      sections:
        Documentation:
          - index.md: Overview, usage, and capabilities
          - installation.md: Setup and installation instructions
          - quickstart.md: Getting started with code actions and MCP tools
          - configuration.md: Configuration directory structure and MCP server setup
          - execution.md: Code and shell command execution in IPython kernels
          - sandbox.md: Sandbox mode for code execution and MCP servers
          - models.md: Model configuration, provider settings, and custom providers
          - sdk.md: Agent SDK for agent integration
          - cli.md: CLI tool and interactive mode
        API Reference:
          - api/agent.md: Agent class, events, and approval workflow
          - api/config.md: Configuration initialization and loading
          - api/generate.md: MCP tool API generation
          - api/permissions.md: Permission management for tool approvals

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      dedent_subsections: true
  - pymdownx.superfences
  - pymdownx.details
  - footnotes
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

nav:
  - Documentation:
    - Overview: index.md
    - Installation: installation.md
    - Quickstart: quickstart.md
    - Configuration: configuration.md
    - Code Execution: execution.md
    - Sandbox Mode: sandbox.md
    - Models: models.md
    - Agent SDK: sdk.md
    - CLI Tool: cli.md
    - Examples:
      - Enhancing Tools: examples/output-parser.md
      - Code Action Reuse: examples/saving-codeacts.md
      - Custom Agent Skills: examples/agent-skills.md
      - Sandbox Mode: examples/sandbox-mode.md
      - Data Analysis: examples/python-packages.md
    - LLM readable:
      - llms.txt: llms.txt
      - llms-full.txt: llms-full.txt
  - API Reference:
    - Agent: api/agent.md
    - Config: api/config.md
    - Generate: api/generate.md
    - Permissions: api/permissions.md
